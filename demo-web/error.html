<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 – PythonDevOps Academy</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --neon:  #00e5ff;
      --neon2: #0080ff;
      --red:   #ff3c3c;
      --bg:    #020d14;
      --glow:  0 0 8px #00e5ff, 0 0 24px #00e5ff88;
      --glow-red: 0 0 8px #ff3c3c, 0 0 24px #ff3c3c88;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: #fff;
      font-family: 'Orbitron', sans-serif;
      overflow: hidden;
    }

    /* ── Animated grid ── */
    #grid {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,.05) 1px, transparent 1px);
      background-size: 48px 48px;
      animation: gridPulse 4s ease-in-out infinite;
      z-index: 0;
    }
    @keyframes gridPulse {
      0%, 100% { opacity: .5; }
      50%       { opacity: 1; }
    }

    /* ── Scanlines ── */
    #scanline {
      position: fixed; inset: 0; z-index: 1;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px, transparent 3px,
        rgba(0,0,0,.12) 3px, rgba(0,0,0,.12) 4px
      );
      pointer-events: none;
      opacity: .4;
    }

    /* ── Corner brackets ── */
    .corner {
      position: fixed;
      width: 44px; height: 44px;
      border-color: var(--neon);
      border-style: solid;
      opacity: .6;
      z-index: 2;
      box-shadow: 0 0 6px #00e5ff88;
      animation: cornerPulse 2s ease-in-out infinite;
    }
    @keyframes cornerPulse {
      0%, 100% { opacity: .6; }
      50%       { opacity: 1; }
    }
    .corner-tl { top: 24px; left: 24px; border-width: 2px 0 0 2px; }
    .corner-tr { top: 24px; right: 24px; border-width: 2px 2px 0 0; }
    .corner-bl { bottom: 24px; left: 24px; border-width: 0 0 2px 2px; }
    .corner-br { bottom: 24px; right: 24px; border-width: 0 2px 2px 0; }

    /* ── Center content ── */
    #content {
      position: relative; z-index: 3;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100%;
      gap: 16px;
      text-align: center;
      padding: 24px;
      animation: fadeIn .8s ease forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Error code ── */
    .error-code {
      font-size: clamp(80px, 18vw, 160px);
      font-weight: 900;
      line-height: 1;
      color: var(--red);
      text-shadow: var(--glow-red);
      letter-spacing: 0.06em;
      animation: redFlicker 5s infinite;
    }
    @keyframes redFlicker {
      0%, 18%, 20%, 22%, 60%, 62%, 100% { text-shadow: var(--glow-red); }
      19%, 21%, 61% { text-shadow: none; opacity: .6; }
    }

    /* ── Status badge ── */
    .status-badge {
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(10px, 1.5vw, 13px);
      letter-spacing: .45em;
      color: var(--red);
      text-transform: uppercase;
      border: 1px solid var(--red);
      padding: 6px 18px;
      border-radius: 2px;
      box-shadow: 0 0 10px #ff3c3c44;
    }

    /* ── Main message ── */
    .error-title {
      font-size: clamp(18px, 3vw, 32px);
      font-weight: 700;
      letter-spacing: 0.12em;
      color: #fff;
      text-shadow: var(--glow);
    }

    .error-sub {
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(11px, 1.5vw, 14px);
      color: rgba(0,229,255,.55);
      letter-spacing: .2em;
      max-width: 480px;
      line-height: 1.7;
    }

    /* ── Divider ── */
    .divider {
      width: min(50vw, 400px); height: 1px;
      background: linear-gradient(90deg, transparent, var(--neon), transparent);
      box-shadow: 0 0 8px var(--neon);
    }

    /* ── Back button ── */
    .btn-home {
      margin-top: 8px;
      display: inline-flex; align-items: center; gap: 10px;
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(11px, 1.4vw, 14px);
      font-weight: 700;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--bg);
      background: var(--neon);
      padding: 12px 32px;
      border: none; border-radius: 2px;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 0 18px #00e5ff88;
      transition: box-shadow .2s, transform .2s;
    }
    .btn-home:hover {
      box-shadow: 0 0 32px #00e5ffcc;
      transform: scale(1.04);
    }

    /* ── Logo small ── */
    .brand {
      display: flex; align-items: center; gap: 10px;
      margin-top: 4px;
    }
    .brand-text {
      font-size: clamp(11px, 1.4vw, 14px);
      font-weight: 700;
      letter-spacing: .18em;
    }
    .brand-text .py     { color: var(--neon2); }
    .brand-text .devops { color: var(--neon); }
    .brand-text .sub    { font-size: .6em; letter-spacing: .35em;
                          color: rgba(255,255,255,.4); display: block; }

    /* ── Glitch line ── */
    .glitch-bar {
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(8px, 1vw, 10px);
      color: rgba(0,229,255,.25);
      letter-spacing: .3em;
      animation: glitchScroll 8s linear infinite;
      white-space: nowrap;
      overflow: hidden;
      width: 100%;
      max-width: 600px;
    }
    @keyframes glitchScroll {
      0%   { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }
  </style>
</head>
<body>

  <div id="grid"></div>
  <div id="scanline"></div>

  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <div id="content">

    <div class="brand">
      <div class="brand-text">
        <span class="py">PYTHON</span><span class="devops">DEVOPS</span>
        <span class="sub">A C A D E M Y</span>
      </div>
    </div>

    <div class="divider"></div>

    <div class="error-code">404</div>

    <div class="status-badge">// ERROR :: PAGE_NOT_FOUND</div>

    <div class="error-title">Signal Lost</div>

    <p class="error-sub">
      The node you requested does not exist in this network.<br>
      It may have been moved, deleted, or never deployed.
    </p>

    <div class="divider"></div>

    <a class="btn-home" href="index.html">
      ◀ &nbsp; Return to Base
    </a>

    <div class="glitch-bar">
      // SYS.ERROR 404 :: NODE_NOT_FOUND :: REROUTING :: CHECK_PATH :: SIGNAL_LOST :: RETRY_CONNECTION ::
    </div>

  </div>

</body>
</html>
